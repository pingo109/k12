<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hành Trình Toán Học: Giải Cứu Nguyên Hàm</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap');
        body { font-family: 'Nunito', sans-serif; user-select: none; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .btn-option {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-option:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .btn-option:active { transform: translateY(1px); }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }
        
        .pop { animation: pop 0.4s ease-out forwards; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }

        .correct-bg { background: linear-gradient(to right, #10b981, #059669) !important; color: white !important; border-color: transparent !important; }
        .wrong-bg { background: linear-gradient(to right, #ef4444, #dc2626) !important; color: white !important; border-color: transparent !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-800 to-pink-700 min-h-screen text-slate-800 flex items-center justify-center p-4">

    <!-- Container chính của Game -->
    <div id="game-container" class="w-full max-w-3xl glass-panel rounded-3xl p-6 sm:p-10 relative overflow-hidden text-white">
        <!-- Vùng render nội dung sẽ được JS chèn vào đây -->
    </div>

    <script>
        // --- DỮ LIỆU CÂU HỎI (Đã tinh chỉnh cho học sinh TB - Khá) ---
        const questionsData = [
            // Cấp 1: Cơ bản
            { level: "Cấp 1: Rừng Khởi Hành (Cơ Bản)", q: "Mệnh đề nào dưới đây đúng với mọi số thực $\\alpha \\neq -1$?", a: "$\\int x^\\alpha dx = \\frac{x^{\\alpha + 1}}{\\alpha + 1} + C$", options: ["$\\int x^\\alpha dx = \\alpha x^{\\alpha - 1} + C$", "$\\int x^\\alpha dx = x^{\\alpha + 1} + C$", "$\\int x^\\alpha dx = \\frac{x^{\\alpha - 1}}{\\alpha - 1} + C$"] },
            { level: "Cấp 1: Rừng Khởi Hành (Cơ Bản)", q: "Họ nguyên hàm của hàm số $f(x) = \\sin x$ là:", a: "$-\\cos x + C$", options: ["$\\cos x + C$", "$\\sin x + C$", "$-\\sin x + C$"] },
            { level: "Cấp 1: Rừng Khởi Hành (Cơ Bản)", q: "Họ nguyên hàm của hàm số $f(x) = \\frac{1}{x}$ trên các khoảng xác định là:", a: "$\\ln |x| + C$", options: ["$\\ln x + C$", "$-\\frac{1}{x^2} + C$", "$e^x + C$"] },
            { level: "Cấp 1: Rừng Khởi Hành (Cơ Bản)", q: "Khẳng định nào sau đây đúng?", a: "$\\int e^x dx = e^x + C$", options: ["$\\int e^x dx = \\frac{e^{x+1}}{x+1} + C$", "$\\int e^x dx = e^{-x} + C$", "$\\int e^x dx = x e^{x-1} + C$"] },
            { level: "Cấp 1: Rừng Khởi Hành (Cơ Bản)", q: "Mệnh đề nào sau đây SAI? (Giả sử các hàm đều liên tục)", a: "$\\int [f(x) \\cdot g(x)] dx = \\int f(x) dx \\cdot \\int g(x) dx$", options: ["$\\int [f(x) + g(x)] dx = \\int f(x) dx + \\int g(x) dx$", "$\\int k f(x) dx = k \\int f(x) dx$ (với $k \\neq 0$)", "$\\int [f(x) - g(x)] dx = \\int f(x) dx - \\int g(x) dx$"] },
            { level: "Cấp 1: Rừng Khởi Hành (Cơ Bản)", q: "Tìm nguyên hàm $\\int (2x + 1) dx$.", a: "$x^2 + x + C$", options: ["$x^2 + 1 + C$", "$2x^2 + x + C$", "$x^2 + C$"] },
            { level: "Cấp 1: Rừng Khởi Hành (Cơ Bản)", q: "Tìm họ nguyên hàm của hàm số $f(x) = \\frac{1}{\\cos^2 x}$.", a: "$\\tan x + C$", options: ["$-\\tan x + C$", "$\\cot x + C$", "$-\\cot x + C$"] },

            // Cấp 2: Vận dụng thấp
            { level: "Cấp 2: Hang Động Luyện Tập (Vận Dụng Thấp)", q: "Cho $F(x)$ là một nguyên hàm của $f(x) = 3x^2$. Biết $F(1) = 2$, tìm $F(x)$.", a: "$F(x) = x^3 + 1$", options: ["$F(x) = x^3 + 2$", "$F(x) = x^3 - 1$", "$F(x) = 3x^3 - 1$"] },
            { level: "Cấp 2: Hang Động Luyện Tập (Vận Dụng Thấp)", q: "Tìm họ nguyên hàm của hàm số $f(x) = 4x^3 - 2x$.", a: "$x^4 - x^2 + C$", options: ["$12x^2 - 2 + C$", "$x^4 - 2x^2 + C$", "$4x^4 - x^2 + C$"] },
            { level: "Cấp 2: Hang Động Luyện Tập (Vận Dụng Thấp)", q: "Tìm họ nguyên hàm của hàm số $f(x) = 4^{2x}$.", a: "$\\frac{4^{2x}}{2\\ln 4} + C$", options: ["$\\frac{4^{2x}}{\\ln 4} + C$", "$4^{2x} \\cdot 2\\ln 4 + C$", "$\\frac{4^{2x+1}}{2x+1} + C$"] },
            { level: "Cấp 2: Hang Động Luyện Tập (Vận Dụng Thấp)", q: "Tìm nguyên hàm của hàm số $f(x) = e^x - 3\\sin x$.", a: "$e^x + 3\\cos x + C$", options: ["$e^x - 3\\cos x + C$", "$e^x + 3\\sin x + C$", "$x e^{x-1} + 3\\cos x + C$"] },
            { level: "Cấp 2: Hang Động Luyện Tập (Vận Dụng Thấp)", q: "Tìm họ nguyên hàm của hàm số $f(x) = \\frac{2}{x} + \\cos x$.", a: "$2\\ln|x| + \\sin x + C$", options: ["$2\\ln|x| - \\sin x + C$", "$-\\frac{2}{x^2} + \\sin x + C$", "$2\\ln x - \\sin x + C$"] },
            { level: "Cấp 2: Hang Động Luyện Tập (Vận Dụng Thấp)", q: "Tìm họ nguyên hàm $\\int (x^3 - \\frac{3}{x}) dx$.", a: "$\\frac{x^4}{4} - 3\\ln|x| + C$", options: ["$\\frac{x^4}{4} + 3\\ln|x| + C$", "$3x^2 + \\frac{3}{x^2} + C$", "$x^4 - 3\\ln|x| + C$"] },
            { level: "Cấp 2: Hang Động Luyện Tập (Vận Dụng Thấp)", q: "Biết $\\int f(x) dx = x^2 + 3x + C$. Giá trị của $f(1)$ là bao nhiêu? (Gợi ý: Đạo hàm nguyên hàm)", a: "$5$", options: ["$4$", "$6$", "$2$"] },

            // Cấp 3: Thực tế
            { level: "Cấp 3: Lâu Đài Thực Tế (Bài Toán Ứng Dụng)", q: "Một vật chuyển động có gia tốc $a(t) = 2t + 1$ (m/s²). Biết vận tốc ban đầu $v(0) = 5$ m/s. Phương trình vận tốc $v(t)$ là:", a: "$t^2 + t + 5$", options: ["$t^2 + t$", "$2t^2 + t + 5$", "$\\frac{t^2}{2} + t + 5$"] },
            { level: "Cấp 3: Lâu Đài Thực Tế (Bài Toán Ứng Dụng)", q: "Tốc độ bơm nước vào bể là $v(t) = 50 - 2t$ (lít/phút). Bể ban đầu rỗng. Lượng nước trong bể sau 10 phút là:", a: "$400$ lít", options: ["$500$ lít", "$480$ lít", "$300$ lít"] },
            { level: "Cấp 3: Lâu Đài Thực Tế (Bài Toán Ứng Dụng)", q: "Một xí nghiệp có hàm chi phí biên $C'(x) = 20 - 0.1x$. Chi phí cố định khi không sản xuất ($x=0$) là $500$ USD. Hàm tổng chi phí $C(x)$ là:", a: "$-0.05x^2 + 20x + 500$", options: ["$-0.1x^2 + 20x + 500$", "$-0.05x^2 + 20x$", "$-0.5x^2 + 20x + 500$"] },
            { level: "Cấp 3: Lâu Đài Thực Tế (Bài Toán Ứng Dụng)", q: "Một ô tô đang chạy với vận tốc $v(t) = 10 - 2t$ (m/s) kể từ lúc phanh ($t=0$). Thời gian từ lúc phanh đến khi xe dừng hẳn ($v=0$) là:", a: "$5$ giây", options: ["$10$ giây", "$2$ giây", "$8$ giây"] },
            { level: "Cấp 3: Lâu Đài Thực Tế (Bài Toán Ứng Dụng)", q: "Một cái cây phát triển chiều cao với tốc độ $h'(t) = 0.2t + 1$ (m/năm). Lúc mới trồng cây cao $1$m. Sau 2 năm cây cao bao nhiêu mét?", a: "$3.4$ m", options: ["$2.4$ m", "$1.4$ m", "$4.0$ m"] },
            { level: "Cấp 3: Lâu Đài Thực Tế (Bài Toán Ứng Dụng)", q: "Số lượng vi khuẩn tăng với tốc độ $N'(t) = 100 e^t$. Ban đầu có $2000$ con. Số lượng vi khuẩn sau 1 giờ là khoảng bao nhiêu? (Lấy $e \\approx 2.7$)", a: "$2270$ con", options: ["$2100$ con", "$2700$ con", "$2000$ con"] }
        ];

        // --- TRẠNG THÁI TRÒ CHƠI ---
        let currentQuestionIndex = 0;
        let score = 0;
        let lives = 3;
        let isAnswering = false;

        // Danh sách các câu châm ngôn về Toán học
        const mathQuotes = [
            '"Toán học là ngôn ngữ mà Thượng đế đã viết nên vũ trụ." <br><span class="text-sm italic opacity-80 mt-2 block">- Galileo Galilei -</span>',
            '"Bản chất của toán học nằm ở sự tự do của nó." <br><span class="text-sm italic opacity-80 mt-2 block">- Georg Cantor -</span>',
            '"Trong toán học, nghệ thuật đề xuất câu hỏi có giá trị cao hơn việc giải quyết nó." <br><span class="text-sm italic opacity-80 mt-2 block">- Georg Cantor -</span>',
            '"Toán học không chỉ là những con số, phương trình, hay thuật toán: đó là sự thấu hiểu." <br><span class="text-sm italic opacity-80 mt-2 block">- William Paul Thurston -</span>',
            '"Đừng lo lắng về những khó khăn của bạn trong toán học. Tôi đảm bảo với bạn rằng những khó khăn của tôi còn lớn hơn." <br><span class="text-sm italic opacity-80 mt-2 block">- Albert Einstein -</span>',
            '"Toán học là môn thể thao của tinh thần." <br><span class="text-sm italic opacity-80 mt-2 block">- Khuyết danh -</span>'
        ];

        function getRandomQuote() {
            return mathQuotes[Math.floor(Math.random() * mathQuotes.length)];
        }

        const container = document.getElementById('game-container');

        // Tiện ích: Trộn mảng ngẫu nhiên
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Tiện ích: Render Toán học
        function renderMath() {
            renderMathInElement(container, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false
            });
        }

        // --- CÁC MÀN HÌNH ---

        function showStartScreen() {
            currentQuestionIndex = 0;
            score = 0;
            lives = 3;
            
            container.innerHTML = `
                <div class="text-center pop flex flex-col items-center justify-center py-10">
                    <div class="text-6xl mb-4">🏰</div>
                    <h1 class="text-4xl sm:text-5xl font-black mb-4 tracking-tight drop-shadow-md">
                        Hành Trình<br><span class="text-yellow-300">Nguyên Hàm</span>
                    </h1>
                    <p class="text-lg text-indigo-100 mb-8 max-w-md mx-auto">
                        Vương quốc Toán Học đang bị xâm lăng! Hãy trả lời đúng 20 thử thách từ mức độ Cơ Bản đến Thực Tế để bảo vệ vương quốc.
                    </p>
                    
                    <div class="flex gap-4 mb-8 text-lg font-bold">
                        <div class="bg-white/20 px-4 py-2 rounded-xl">❤️ 3 Mạng</div>
                        <div class="bg-white/20 px-4 py-2 rounded-xl">⚔️ 20 Cửa ải</div>
                    </div>

                    <button onclick="startGame()" class="bg-gradient-to-r from-yellow-400 to-yellow-500 text-yellow-900 font-black text-2xl py-4 px-12 rounded-full hover:scale-105 transition-transform shadow-[0_0_20px_rgba(250,204,21,0.5)]">
                        BẮT ĐẦU CHIẾN ĐẤU
                    </button>
                </div>
            `;
            renderMath();
        }

        function startGame() {
            showQuestion();
        }

        function showQuestion() {
            isAnswering = false;
            if (currentQuestionIndex >= questionsData.length) {
                showVictoryScreen();
                return;
            }

            const qData = questionsData[currentQuestionIndex];
            const allOptions = shuffleArray([qData.a, ...qData.options]);
            
            const progressPct = (currentQuestionIndex / questionsData.length) * 100;

            container.innerHTML = `
                <div class="fade-in">
                    <!-- Header: Stats -->
                    <div class="flex justify-between items-center mb-6 text-lg sm:text-xl font-bold bg-black/20 p-3 rounded-2xl">
                        <div class="flex items-center gap-2">
                            <span class="text-2xl">🪙</span> ${score}
                        </div>
                        <div class="text-center text-sm sm:text-base text-yellow-200 uppercase tracking-widest font-black">
                            ${qData.level}
                        </div>
                        <div class="flex items-center gap-1">
                            ${'❤️'.repeat(lives)}${'🖤'.repeat(3 - lives)}
                        </div>
                    </div>

                    <!-- Progress Bar -->
                    <div class="w-full bg-black/30 h-3 rounded-full mb-8 overflow-hidden">
                        <div class="bg-gradient-to-r from-green-400 to-emerald-500 h-full transition-all duration-500" style="width: ${progressPct}%"></div>
                    </div>

                    <!-- Question -->
                    <div class="bg-white text-slate-800 rounded-3xl p-6 sm:p-8 mb-8 shadow-xl relative text-center min-h-[120px] flex items-center justify-center">
                        <div class="absolute -top-5 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-4 py-1 rounded-full text-sm font-bold shadow-md border-2 border-white">
                            Câu ${currentQuestionIndex + 1} / ${questionsData.length}
                        </div>
                        <h2 class="text-xl sm:text-2xl font-bold leading-relaxed">${qData.q}</h2>
                    </div>

                    <!-- Options -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="options-container">
                        ${allOptions.map((opt, idx) => `
                            <button onclick="handleAnswer(this, '${opt.replace(/'/g, "\\'")}', '${qData.a.replace(/'/g, "\\'")}')" 
                                class="btn-option bg-white/10 hover:bg-white/20 border border-white/30 text-white rounded-2xl p-4 sm:p-5 text-lg sm:text-xl font-semibold text-center break-words flex items-center justify-center min-h-[80px]">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            renderMath();
        }

        function handleAnswer(btnElement, selectedOpt, correctOpt) {
            if (isAnswering) return;
            isAnswering = true;

            const isCorrect = selectedOpt === correctOpt;

            // Highlight buttons
            const buttons = document.querySelectorAll('.btn-option');
            buttons.forEach(btn => {
                btn.style.pointerEvents = 'none'; // Disable clicks
                // Re-render math context from button text to compare properly if needed, but direct text compare works since we passed raw string
                if (btn.innerText.trim() === correctOpt.replace(/\$/g, '').trim() || btn.innerHTML.includes(correctOpt)) {
                    // Try to guess the right button. It's better to check the onclick text
                }
            });

            if (isCorrect) {
                btnElement.classList.add('correct-bg', 'pop');
                score += 100;
                setTimeout(() => {
                    currentQuestionIndex++;
                    showQuestion();
                }, 1200);
            } else {
                btnElement.classList.add('wrong-bg', 'shake');
                lives--;
                
                // Find and highlight correct answer
                buttons.forEach(btn => {
                    if (btn.getAttribute('onclick').includes(`'${correctOpt.replace(/'/g, "\\'")}'`)) {
                        btn.classList.add('correct-bg');
                    }
                });

                setTimeout(() => {
                    if (lives <= 0) {
                        showGameOverScreen();
                    } else {
                        currentQuestionIndex++;
                        showQuestion();
                    }
                }, 2000);
            }
        }

        function showGameOverScreen() {
            container.innerHTML = `
                <div class="text-center fade-in py-6 sm:py-10 flex flex-col items-center">
                    <div class="text-6xl sm:text-7xl mb-4">💔</div>
                    <h1 class="text-3xl sm:text-5xl font-black mb-2 text-red-300">THẤT BẠI!</h1>
                    <p class="text-lg sm:text-xl mb-6 px-4">Bạn đã hết sinh lực tại câu số ${currentQuestionIndex + 1}.</p>
                    
                    <div class="bg-black/20 rounded-2xl p-6 mb-8 w-full max-w-sm">
                        <div class="text-sm text-indigo-200 uppercase tracking-widest mb-1">Điểm số thu thập</div>
                        <div class="text-5xl font-black text-yellow-400">🪙 ${score}</div>
                    </div>

                    <button onclick="showStartScreen()" class="bg-white text-indigo-900 font-bold text-lg sm:text-xl py-3 px-8 sm:px-10 rounded-full hover:bg-gray-100 transition-colors shadow-lg mb-8">
                        Chơi Lại Từ Đầu
                    </button>

                    <!-- Châm ngôn Toán học -->
                    <div class="mt-4 p-5 bg-white/10 rounded-xl w-full max-w-md border border-white/20 shadow-inner">
                        <p class="text-indigo-100 font-medium leading-relaxed text-base sm:text-lg">
                            ${getRandomQuote()}
                        </p>
                    </div>
                </div>
            `;
            renderMath();
        }

        function showVictoryScreen() {
            container.innerHTML = `
                <div class="text-center pop py-6 sm:py-10 flex flex-col items-center">
                    <div class="text-6xl sm:text-7xl mb-4">👑</div>
                    <h1 class="text-3xl sm:text-5xl font-black mb-2 text-yellow-300">CHIẾN THẮNG!</h1>
                    <p class="text-lg sm:text-xl mb-6 text-indigo-100 px-4">Bạn đã vượt qua toàn bộ ${questionsData.length} thử thách và giải cứu Vương Quốc!</p>
                    
                    <div class="bg-white/20 rounded-3xl p-6 sm:p-8 mb-8 w-full max-w-sm border border-yellow-300/50 shadow-[0_0_30px_rgba(250,204,21,0.2)]">
                        <div class="text-sm text-indigo-100 uppercase tracking-widest mb-2">Tổng điểm kỷ lục</div>
                        <div class="text-5xl sm:text-6xl font-black text-yellow-400 drop-shadow-lg mb-4">🪙 ${score}</div>
                        <div class="text-base sm:text-lg font-bold">Mạng còn lại: ${'❤️'.repeat(lives)}</div>
                    </div>

                    <button onclick="showStartScreen()" class="bg-gradient-to-r from-green-400 to-emerald-500 text-white font-bold text-lg sm:text-xl py-3 px-8 sm:px-10 rounded-full hover:scale-105 transition-transform shadow-lg mb-8">
                        Chơi Lại Lần Nữa
                    </button>

                    <!-- Châm ngôn Toán học -->
                    <div class="mt-4 p-5 bg-white/10 rounded-xl w-full max-w-md border border-yellow-300/30 shadow-inner">
                        <p class="text-indigo-100 font-medium leading-relaxed text-base sm:text-lg">
                            ${getRandomQuote()}
                        </p>
                    </div>
                </div>
            `;
            renderMath();
        }

        // Bắt đầu game khi load xong
        window.onload = showStartScreen;
    </script>
</body>
</html>
